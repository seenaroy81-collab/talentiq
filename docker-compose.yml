services:
  backend:
    build: ./backend
    ports:
      - "5002:5000"
    environment:
      - PORT=5000
      - DB_URL=mongodb://mongodb:27017/talent-iq
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      # Add other env vars here (GROQ_API_KEY, etc. should be in a .env file locally)
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"

  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
